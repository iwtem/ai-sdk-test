services:
  minio:
    image: minio/minio:latest
    container_name: langchain-fe-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: langchain-fe-onlyoffice
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      # 本地联调建议先关闭 JWT；生产环境请开启并配置 JWT_SECRET
      JWT_ENABLED: "false"
      # 允许 DocumentServer 拉取私网地址（如 host.docker.internal）
      ALLOW_PRIVATE_IP_ADDRESS: "true"
      # 允许解析/访问特殊元地址（本地联调时建议开启）
      ALLOW_META_IP_ADDRESS: "true"
    # Linux 下可让容器解析 host.docker.internal（Windows/macOS Docker Desktop 通常已内置）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
      - onlyoffice_db:/var/lib/postgresql

volumes:
  minio_data:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_lib:
  onlyoffice_db:
